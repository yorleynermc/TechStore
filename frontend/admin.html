<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - TechStore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🛒 TechStore Admin</a>
            <div class="nav-links">
                <span id="admin-user">Admin</span>
                <button id="logout-btn" class="btn-secondary">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container admin-container">
        <div class="admin-sidebar">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="productos">📦 Productos</button>
        </div>

        <div class="admin-main">
            <!-- DASHBOARD -->
            <div id="dashboard" class="tab-content active">
                <h2>Dashboard</h2>
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <h3>Total de Productos</h3>
                        <p class="dashboard-number" id="total-productos">0</p>
                    </div>
                    <div class="dashboard-card">
                        <h3>Productos Activos</h3>
                        <p class="dashboard-number" id="productos-activos">0</p>
                    </div>
                    <div class="dashboard-card alert">
                        <h3>Stock Bajo ⚠️</h3>
                        <p class="dashboard-number" id="stock-bajo-count">0</p>
                    </div>
                </div>

                <div class="stock-bajo-section">
                    <h3>Productos con Stock Bajo</h3>
                    <div id="stock-bajo-list" class="products-list">
                        <!-- Se cargarán aquí -->
                    </div>
                </div>
            </div>

            <!-- PRODUCTOS CRUD -->
            <div id="productos" class="tab-content">
                <h2>Gestión de Productos</h2>

                <div class="producto-form-section">
                    <h3 id="form-title">Nuevo Producto</h3>
                    <form id="producto-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="form-nombre">Nombre:</label>
                                <input type="text" id="form-nombre" required>
                            </div>
                            <div class="form-group">
                                <label for="form-categoria">Categoría:</label>
                                <select id="form-categoria" required>
                                    <option value="Audio">Audio</option>
                                    <option value="Computadoras">Computadoras</option>
                                    <option value="Perifericos">Periféricos</option>
                                    <option value="Accesorios">Accesorios</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="form-precio">Precio:</label>
                                <input type="number" id="form-precio" min="0" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="form-stock">Stock:</label>
                                <input type="number" id="form-stock" min="0" required>
                            </div>
                            <div class="form-group">
                                <label for="form-minimo">Stock Mínimo:</label>
                                <input type="number" id="form-minimo" min="0" value="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="form-descripcion">Descripción:</label>
                            <textarea id="form-descripcion" rows="3" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="form-imagen">URL de Imagen:</label>
                            <input type="url" id="form-imagen">
                        </div>

                        <div class="form-group checkbox">
                            <label>
                                <input type="checkbox" id="form-activo" checked>
                                Producto Activo
                            </label>
                        </div>

                        <button type="submit" class="btn-primary">Guardar</button>
                        <button type="button" id="cancel-btn" class="btn-secondary hidden">Cancelar</button>
                    </form>
                </div>

                <div class="productos-list-section">
                    <h3>Lista de Productos</h3>
                    <div id="productos-list" class="admin-products-list">
                        <!-- Se cargarán aquí -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TechStore. Sistema de Gestión de Tienda Online.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/admin-panel.js"></script>
</body>
</html>
